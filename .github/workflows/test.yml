name: tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.19'
            otp: '28'
    steps:
      - uses: actions/checkout@v4

      # The liveview_generate/3 tests shell out to `mix phx.new lv_test`
      # to scaffold a Phoenix project, then patch it. Phoenix's project
      # generator is shipped as a Hex archive, not bundled with Elixir.
      # The `local: true` flavour of those tests resolves `MOB_DIR` /
      # `MOB_DEV_DIR` / `./mob` / `../mob` for in-tree path deps — we
      # check the sister repos into the workspace so those resolutions
      # land in CI without a sibling on the host filesystem.
      - name: Checkout mob (for --local path resolution)
        uses: actions/checkout@v4
        with:
          repository: GenericJam/mob
          path: mob-checkout

      - name: Checkout mob_dev (for --local path resolution)
        uses: actions/checkout@v4
        with:
          repository: GenericJam/mob_dev
          path: mob_dev-checkout

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get
      - run: mix deps.compile
      - run: mix compile --warnings-as-errors

      - name: Install Phoenix project generator
        # phx_new is the `mix phx.new` archive. Cached in ~/.mix/archives
        # between runs by the cache action above (deps + _build only —
        # not ~/.mix), so the install runs cold on every job. It's small
        # (a few hundred ms) so caching ~/.mix isn't worth the complexity.
        run: mix archive.install hex phx_new --force

      - name: Format check
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict

      # mob_new's tests run `mix phx.new` under the hood for the LiveView path
      # (~40s wall clock per case). Total suite is ~100s — bumping the timeout
      # to 10 minutes to absorb cold-cache variability.
      - name: Tests
        env:
          # Point the local-mob resolver at the checkouts we cloned above
          # so `liveview_generate/3 generates local dep paths when --local
          # flag set` and the --python E2E test find an mob / mob_dev tree.
          MOB_DIR: ${{ github.workspace }}/mob-checkout
          MOB_DEV_DIR: ${{ github.workspace }}/mob_dev-checkout
        run: mix test
        timeout-minutes: 10

  drift_check:
    name: Phoenix drift / mob.adopt acceptance
    needs: test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Checkout mob (for --local path resolution)
        uses: actions/checkout@v4
        with:
          repository: GenericJam/mob
          path: mob-checkout

      - name: Checkout mob_dev (for --local path resolution)
        uses: actions/checkout@v4
        with:
          repository: GenericJam/mob_dev
          path: mob_dev-checkout

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'

      - name: Cache deps + _build (reuse test job's key)
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-1.19-28-${{ hashFiles('**/mix.lock') }}
          restore-keys: mix-${{ runner.os }}-1.19-28-

      - run: mix deps.get
      - run: mix deps.compile

      - name: Install Phoenix project generator (latest from Hex)
        run: mix archive.install hex phx_new --force

      - name: Build + install local mob_new archive
        run: |
          mix archive.build
          mix archive.install mob_new-*.ez --force

      - name: Acceptance + drift check
        env:
          MOB_DIR: ${{ github.workspace }}/mob-checkout
          MOB_DEV_DIR: ${{ github.workspace }}/mob_dev-checkout
        run: mix test --only acceptance
        timeout-minutes: 15

  security_scan:
    name: Security scan (mix_audit)
    needs: test
    runs-on: ubuntu-latest
    if: always()
    continue-on-error: true
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'

      - name: Cache deps + _build (reuse test job's key)
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-1.19-28-${{ hashFiles('**/mix.lock') }}
          restore-keys: mix-${{ runner.os }}-1.19-28-

      - run: mix deps.get
      - run: mix deps.compile

      # mix_audit scans mix.lock against the Erlef advisory feed. The
      # `app.start +` prefix is load-bearing: plain `mix deps.audit` fails
      # with `YamlElixir.read_from_file/1 is undefined` because mix_audit
      # doesn't ensure_all_started yaml_elixir on its own.
      - name: Audit deps
        run: mix do app.start + deps.audit
