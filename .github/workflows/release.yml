name: release

on:
  push:
    tags:
      # GitHub Actions filter patterns are glob (minimatch), NOT regex.
      # `+` outside extglob `+(...)` is a literal `+`, not a quantifier —
      # so the regex-looking `[0-9]+.[0-9]+.[0-9]+` matches strings like
      # `5+.5+.5+` and never `0.6.5`. Plain `*` is the right glob.
      - '*.*.*'        # X.Y.Z
      - '*.*.*-*'      # X.Y.Z-prerelease (rc, alpha, beta, etc.)

# Only one release run per tag at a time. Cancelling in-progress is
# deliberately OFF — a release in flight should always finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # required to create a GitHub Release

jobs:
  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so action-gh-release can build a changelog from the
          # commits between this tag and the previous one.
          fetch-depth: 0

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Pull the section under "## [<tag>]" or "## <tag>" up to the
            # next "## " heading. If nothing matches, the body falls back
            # to auto-generated commit notes.
            awk -v tag="${{ github.ref_name }}" '
              $0 ~ "^## \\[" tag "\\]" || $0 ~ "^## " tag "( |$)" { in_section=1; next }
              in_section && /^## / { exit }
              in_section { print }
            ' CHANGELOG.md > /tmp/release-body.md
            if [ -s /tmp/release-body.md ]; then
              echo "has_body=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_body=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_body=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # If CHANGELOG.md had a matching section, use it. Otherwise let
          # the action auto-generate notes from the commit log since the
          # last tag.
          body_path: ${{ steps.changelog.outputs.has_body == 'true' && '/tmp/release-body.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.has_body != 'true' }}

  hex_publish:
    name: Publish to Hex
    needs: github_release
    runs-on: ubuntu-latest
    env:
      # Reads the repo secret. If it's unset (or scoped to a different
      # event), `if: env.HEX_API_KEY != ''` below skips the publish step
      # cleanly instead of failing with an auth error.
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        if: env.HEX_API_KEY != ''
        with:
          elixir-version: '1.19'
          otp-version: '28'

      - name: Fetch deps
        if: env.HEX_API_KEY != ''
        run: mix deps.get

      - name: mix hex.publish
        if: env.HEX_API_KEY != ''
        # `--yes` skips the interactive confirm. `mix hex.publish` (no
        # subcommand) ships both the package archive AND docs in one
        # call, which matches what most maintainers want per release.
        # If a version was already published manually this will fail
        # loudly — that's the right signal, not a silent skip.
        run: mix hex.publish --yes

      - name: Skip notice (no HEX_API_KEY configured)
        if: env.HEX_API_KEY == ''
        run: |
          echo "::notice::HEX_API_KEY secret is not set on this repository."
          echo "::notice::Skipping Hex publish. Add the secret at"
          echo "::notice::https://github.com/${{ github.repository }}/settings/secrets/actions"
          echo "::notice::and re-tag (or re-run this workflow) to publish."
